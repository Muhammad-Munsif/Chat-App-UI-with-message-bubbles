<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>WaveChat · Complete Messaging Solution</title>
  <!-- Tailwind + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #60a5fa;
  --primary-gradient: linear-gradient(135deg, #2563eb, #7c3aed, #db2777);
  --primary-gradient-subtle: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.1), rgba(219, 39, 119, 0.1));
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --bg-main: #f8fafc;
  --bg-surface: #ffffff;
  --bg-sidebar: #ffffff;
  --bg-hover: rgba(37, 99, 235, 0.05);
  --text-primary: #0f172a;
  --text-secondary: #64748b;
  --border-light: #e2e8f0;
  --incoming-bubble: #f1f5f9;
  --outgoing-bubble: #2563eb;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 8px 20px -6px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
  --shadow-inner: inset 0 2px 4px rgba(0, 0, 0, 0.02);
}

[data-theme="dark"] {
  --primary: #3b82f6;
  --primary-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
  --primary-gradient-subtle: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
  --bg-main: #0f172a;
  --bg-surface: #1e293b;
  --bg-sidebar: #1e293b;
  --bg-hover: rgba(59, 130, 246, 0.15);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --border-light: #334155;
  --incoming-bubble: #1e293b;
  --outgoing-bubble: #3b82f6;
}

body {
  background: var(--bg-main);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  transition: all 0.3s ease;
}

.app {
  display: flex;
  height: 100%;
  max-width: 1600px;
  margin: 0 auto;
  position: relative;
  background: var(--bg-main);
}

/* Sidebar */
.sidebar {
  width: 380px;
  min-width: 320px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 50;
  box-shadow: var(--shadow-md);
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: min(90%, 360px);
    transform: translateX(-100%);
  }

  .sidebar.active {
    transform: translateX(0);
  }
}

/* Avatars */
.avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  background: var(--primary-gradient);
  color: white;
  border-radius: 16px;
  flex-shrink: 0;
  transition: all 0.3s;
  box-shadow: 0 6px 12px -4px rgba(37, 99, 235, 0.3);
}

.avatar-sm {
  width: 48px;
  height: 48px;
  font-size: 1.3rem;
}

.avatar-md {
  width: 56px;
  height: 56px;
  font-size: 1.5rem;
}

.avatar-lg {
  width: 80px;
  height: 80px;
  font-size: 2rem;
  border-radius: 24px;
}

.avatar:hover {
  transform: scale(1.05) rotate(2deg);
  box-shadow: 0 10px 20px -6px rgba(37, 99, 235, 0.5);
}

.status-badge {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 3px solid var(--bg-sidebar);
  transition: all 0.3s;
}

.online {
  background: var(--success);
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
}

.away {
  background: var(--warning);
  box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
}

.dnd {
  background: var(--danger);
  box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
}

.offline {
  background: var(--text-secondary);
}

/* Conversation items */
.conv-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  margin: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.conv-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--primary-gradient-subtle);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 0;
}

.conv-item:hover::before {
  opacity: 1;
}

.conv-item:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-sm);
}

.conv-item.active {
  background: var(--primary-gradient);
  color: white;
  box-shadow: var(--shadow-md);
}

.conv-item.active .status-badge {
  border-color: transparent;
}

.conv-item.active .text-secondary {
  color: rgba(255, 255, 255, 0.8);
}

.conv-item>* {
  position: relative;
  z-index: 1;
}

/* Online strip */
.online-strip {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding: 16px 16px;
  scrollbar-width: thin;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-light);
}

.online-strip::-webkit-scrollbar {
  height: 4px;
}

.online-strip::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 20px;
}

.online-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 64px;
}

.online-item:hover {
  transform: translateY(-4px);
}

.online-item .avatar {
  width: 56px;
  height: 56px;
  font-size: 1.4rem;
}

/* Messages panel */
.msg-panel {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.03) 0%, transparent 30%);
}

.msg-row {
  display: flex;
  margin-bottom: 12px;
  animation: slideIn 0.3s ease;
}

.msg-row.out {
  justify-content: flex-end;
}

.bubble {
  max-width: 70%;
  padding: 14px 20px;
  border-radius: 24px;
  font-size: 0.95rem;
  line-height: 1.5;
  word-wrap: break-word;
  position: relative;
  transition: all 0.3s;
  animation: bubblePop 0.3s ease;
}

@keyframes bubblePop {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }

  100% {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.bubble.in {
  background: var(--incoming-bubble);
  color: var(--text-primary);
  border-bottom-left-radius: 8px;
  box-shadow: var(--shadow-sm), var(--shadow-inner);
}

.bubble.out {
  background: var(--outgoing-bubble);
  color: white;
  border-bottom-right-radius: 8px;
  box-shadow: var(--shadow-md);
}

.bubble:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.message-time {
  font-size: 0.7rem;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
}

/* Date divider */
.date-divider {
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.date-divider span {
  background: var(--primary-gradient);
  padding: 6px 20px;
  border-radius: 30px;
  font-size: 0.8rem;
  font-weight: 600;
  color: white;
  box-shadow: var(--shadow-sm);
}

/* Input area */
.input-area {
  background: var(--bg-surface);
  border-top: 1px solid var(--border-light);
  padding: 20px 24px;
}

.input-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-main);
  border-radius: 60px;
  padding: 6px 6px 6px 24px;
  border: 2px solid transparent;
  transition: all 0.3s;
  box-shadow: var(--shadow-sm);
}

.input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
  transform: scale(1.01);
}

.msg-input {
  flex: 1;
  background: transparent;
  border: 0;
  padding: 14px 0;
  font-size: 1rem;
  color: var(--text-primary);
  outline: none;
}

.msg-input::placeholder {
  color: var(--text-secondary);
}

.icon-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  background: transparent;
}

.icon-btn:hover {
  background: var(--bg-hover);
  transform: scale(1.1);
  color: var(--primary);
}

.send-btn {
  background: var(--primary-gradient);
  color: white;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
}

.send-btn:hover {
  transform: scale(1.15) rotate(5deg);
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.5);
}

.send-btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* Attachment menu */
.attach-menu {
  position: absolute;
  bottom: 100px;
  left: 24px;
  background: var(--bg-surface);
  backdrop-filter: blur(16px);
  border-radius: 40px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-light);
  padding: 16px 32px;
  display: flex;
  gap: 40px;
  z-index: 40;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.attach-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s;
}

.attach-item:hover {
  transform: translateY(-6px);
}

.attach-item i {
  font-size: 2rem;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Call modal */
.call-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.call-modal.active {
  display: flex;
}

.call-container {
  width: 95%;
  max-width: 1200px;
  background: var(--bg-surface);
  border-radius: 32px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}

.call-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.call-videos {
  display: flex;
  gap: 20px;
  padding: 20px;
  background: #0f1219;
  min-height: 500px;
}

@media (max-width: 768px) {
  .call-videos {
    flex-direction: column;
    min-height: 400px;
  }
}

.video-container {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: #1a1f2e;
}

.video-container.remote-video {
  flex: 3;
}

.video-container.local-video {
  flex: 1;
  max-width: 300px;
}

@media (max-width: 768px) {
  .video-container.local-video {
    max-width: 140px;
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 10;
  }
}

.video-element {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-label {
  position: absolute;
  bottom: 16px;
  left: 16px;
  color: white;
  background: rgba(0, 0, 0, 0.5);
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 0.9rem;
  backdrop-filter: blur(4px);
}

.call-controls {
  padding: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-light);
  flex-wrap: wrap;
}

.call-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  background: var(--bg-main);
  color: var(--text-primary);
}

.call-btn:hover {
  transform: scale(1.15);
}

.call-btn.danger {
  background: var(--danger);
  color: white;
}

.call-btn.success {
  background: var(--success);
  color: white;
}

.call-btn.muted {
  background: #6b7280;
  color: white;
}

.call-timer {
  font-size: 1.2rem;
  font-weight: 600;
  background: var(--bg-main);
  padding: 10px 24px;
  border-radius: 40px;
}

/* Auth modal */
.auth-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(16px);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
}

.auth-modal.active {
  display: flex;
}

.auth-container {
  width: 90%;
  max-width: 450px;
  background: var(--bg-surface);
  border-radius: 32px;
  padding: 40px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.4s ease;
}

.auth-tabs {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  border-bottom: 2px solid var(--border-light);
  padding-bottom: 16px;
}

.auth-tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 12px;
  transition: all 0.3s;
}

.auth-tab.active {
  background: var(--primary-gradient);
  color: white;
}

.auth-form {
  display: none;
}

.auth-form.active {
  display: block;
}

.auth-input {
  width: 100%;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 16px;
  border: 2px solid var(--border-light);
  background: var(--bg-main);
  color: var(--text-primary);
  font-size: 1rem;
  transition: all 0.3s;
}

.auth-input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
}

.auth-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  background: var(--primary-gradient);
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
}

.auth-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.hidden {
  display: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary-gradient);
  color: white;
  padding: 14px 28px;
  border-radius: 40px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 3000;
  animation: slideUp 0.3s ease;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 20px;
  background: var(--incoming-bubble);
  border-radius: 30px;
  width: fit-content;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typing {

  0%,
  60%,
  100% {
    transform: translateY(0);
    opacity: 0.4;
  }

  30% {
    transform: translateY(-6px);
    opacity: 1;
  }
}

/* Unread badge */
.unread-badge {
  background: var(--primary-gradient);
  color: white;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 30px;
  margin-left: 8px;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}
  </style>

</head>

<body data-theme="light">
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="p-6 border-b border-light">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="avatar avatar-md">
              <i class="fa-regular fa-comment"></i>
            </div>
            <h1
              class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">
              WaveChat
            </h1>
          </div>
          <div class="flex gap-2">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-sun"></i></button>
            <button class="icon-btn" onclick="app.showAuthModal()" id="authBtn"><i
                class="fas fa-sign-in-alt"></i></button>
          </div>
        </div>
        <div class="relative">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-secondary"></i>
          <input type="text" placeholder="Search conversations..." id="searchInput"
            class="w-full pl-12 pr-4 py-3 rounded-2xl bg-surface outline-none focus:ring-2 focus:ring-primary/20"
            style="background: var(--bg-surface);">
        </div>
      </div>

      <div class="py-3 border-b border-light">
        <div class="flex justify-between px-4 mb-3">
          <span class="font-bold text-sm uppercase tracking-wider">Online</span>
          <span class="text-sm font-bold text-primary" id="onlineCount">0</span>
        </div>
        <div class="online-strip" id="onlineUsers"></div>
      </div>

      <div class="flex-1 overflow-y-auto py-3" id="conversationsList"></div>

      <div class="border-t p-4 flex items-center gap-3 cursor-pointer hover:bg-hover transition"
        onclick="app.showProfile()">
        <div class="relative">
          <div class="avatar avatar-sm" id="currentUserAvatar"><i class="fas fa-user"></i></div>
          <span class="status-badge online" id="currentUserStatus"></span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-bold truncate" id="currentUserDisplayName">Guest User</div>
          <div class="text-xs text-secondary truncate" id="currentUserEmail">Click to login</div>
        </div>
        <i class="fas fa-chevron-right text-secondary"></i>
      </div>
    </aside>

    <!-- overlay -->
    <div class="overlay hidden" id="overlay" onclick="app.closeSidebar()"></div>

    <!-- MAIN CHAT -->
    <main class="chat">
      <!-- chat header -->
      <div
        class="flex items-center justify-between px-4 md:px-6 py-4 border-b bg-surface/80 backdrop-blur-lg sticky top-0"
        style="border-color: var(--border-light); z-index: 10;">
        <div class="flex items-center gap-3 min-w-0">
          <button class="md:hidden icon-btn" onclick="app.toggleSidebar()"><i class="fas fa-bars"></i></button>
          <div class="relative flex-shrink-0">
            <div class="avatar avatar-sm" id="chatUserAvatar"><i class="fas fa-user-friends"></i></div>
            <span class="status-badge online" id="chatUserStatus"></span>
          </div>
          <div class="min-w-0">
            <h2 class="font-bold text-lg truncate" id="chatUserName">Select a chat</h2>
            <p class="text-xs text-secondary truncate" id="chatUserStatusText">Click to start messaging</p>
          </div>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button class="icon-btn" onclick="app.startAudioCall()" id="audioCallBtn" disabled><i
              class="fas fa-phone"></i></button>
          <button class="icon-btn" onclick="app.startVideoCall()" id="videoCallBtn" disabled><i
              class="fas fa-video"></i></button>
          <button class="icon-btn" onclick="app.toggleChatMenu()"><i class="fas fa-ellipsis-v"></i></button>
        </div>
      </div>

      <!-- messages -->
      <div class="msg-panel" id="messagesContainer">
        <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-6">
          <div
            class="w-28 h-28 rounded-3xl bg-gradient-to-br from-blue-500 to-pink-500 flex items-center justify-center mb-6 shadow-xl">
            <i class="fas fa-comments text-5xl text-white"></i>
          </div>
          <h3
            class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-blue-600 to-pink-600 bg-clip-text text-transparent">
            Welcome to WaveChat
          </h3>
          <p class="text-secondary max-w-sm mb-8">Sign in to start messaging with friends</p>
          <button onclick="app.showAuthModal()"
            class="px-8 py-4 bg-gradient-to-r from-blue-600 to-pink-600 text-white rounded-full font-bold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
        </div>
        <div id="chatMessages" class="hidden w-full space-y-2"></div>
      </div>

      <!-- input area -->
      <div class="input-area relative">
        <div class="input-wrapper">
          <button class="icon-btn" onclick="app.toggleAttachmentMenu()" id="attachBtn" disabled><i
              class="fas fa-plus"></i></button>
          <input type="text" class="msg-input" placeholder="Type a message..." id="messageInput" disabled>
          <button class="icon-btn send-btn" onclick="app.sendMessage()" id="sendButton" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <div id="attachmentMenu" class="attach-menu hidden">
          <div class="attach-item" onclick="app.handlePhotoUpload()"><i class="fas fa-image"></i><span>Photo</span>
          </div>
          <div class="attach-item" onclick="app.handleFileUpload()"><i class="fas fa-file"></i><span>File</span></div>
          <div class="attach-item" onclick="app.handleLocation()"><i
              class="fas fa-map-marker-alt"></i><span>Location</span></div>
        </div>
      </div>
    </main>
  </div>

  <!-- AUTH MODAL -->
  <div class="auth-modal" id="authModal">
    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="app.switchAuthTab('login')">Login</div>
        <div class="auth-tab" onclick="app.switchAuthTab('register')">Register</div>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="loginForm">
        <input type="email" class="auth-input" placeholder="Email" id="loginEmail" value="demo@wavechat.com">
        <input type="password" class="auth-input" placeholder="Password" id="loginPassword" value="demo123">
        <button class="auth-btn" onclick="app.login()">Sign In</button>
        <p class="text-center mt-4 text-sm text-secondary">
          <i class="fas fa-info-circle"></i> Use any email/password for demo
        </p>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="registerForm">
        <input type="text" class="auth-input" placeholder="Display Name" id="registerName" value="Demo User">
        <input type="email" class="auth-input" placeholder="Email" id="registerEmail" value="demo@wavechat.com">
        <input type="password" class="auth-input" placeholder="Password" id="registerPassword" value="demo123">
        <button class="auth-btn" onclick="app.register()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- INCOMING CALL MODAL -->
  <div class="call-modal" id="incomingCallModal">
    <div class="call-container" style="max-width: 400px;">
      <div class="p-8 text-center">
        <div class="avatar avatar-lg mx-auto mb-4" id="incomingCallAvatar">
          <i class="fas fa-user"></i>
        </div>
        <h3 class="text-2xl font-bold mb-2" id="incomingCallName">John Doe</h3>
        <p class="text-secondary mb-6" id="incomingCallType">Incoming video call...</p>
        <div class="flex gap-4 justify-center">
          <button class="call-btn success" onclick="app.acceptCall()"><i class="fas fa-phone"></i></button>
          <button class="call-btn danger" onclick="app.declineCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- CALL MODAL -->
  <div class="call-modal" id="callModal">
    <div class="call-container">
      <div class="call-header">
        <div class="flex items-center gap-3">
          <div class="avatar avatar-sm" id="callUserAvatar"><i class="fas fa-user"></i></div>
          <div>
            <h3 class="font-bold text-lg" id="callUserName">Calling...</h3>
            <p class="text-sm text-secondary" id="callStatus">Connecting</p>
          </div>
        </div>
        <button class="icon-btn" onclick="app.minimizeCall()"><i class="fas fa-minus"></i></button>
      </div>

      <div class="call-videos">
        <div class="video-container remote-video">
          <video class="video-element" id="remoteVideo" autoplay playsinline></video>
          <div class="video-label">Remote user</div>
        </div>
        <div class="video-container local-video">
          <video class="video-element" id="localVideo" autoplay playsinline muted></video>
          <div class="video-label">You</div>
        </div>
      </div>

      <div class="call-controls">
        <button class="call-btn" onclick="app.toggleCallMute()" id="callMuteBtn"><i
            class="fas fa-microphone"></i></button>
        <button class="call-btn" onclick="app.toggleCallVideo()" id="callVideoBtn"><i class="fas fa-video"></i></button>
        <button class="call-btn success" onclick="app.shareScreen()"><i class="fas fa-desktop"></i></button>
        <button class="call-btn danger" onclick="app.endCall()"><i class="fas fa-phone-slash"></i></button>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>
    </div>
  </div>

  <!-- hidden file inputs -->
  <input type="file" id="photoInput" class="hidden" accept="image/*">
  <input type="file" id="fileInput" class="hidden" accept="*/*">

  <script src="js/script.js"></script>
</body>

</html>
