<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>WaveChat · beautiful messaging</title>
  <!-- Tailwind + Font Awesome 6 + Inter font + Anime.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet">

</head>

<body data-theme="light">
  <div class="app">
    <!-- SIDEBAR with premium design -->
    <aside class="sidebar" id="sidebar">
      <div class="p-6 border-b border-light" style="border-color: var(--border-light);">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 min-w-0">
            <div class="avatar avatar-md">
              <i class="fa-regular fa-comment"></i>
            </div>
            <h1 class="text-3xl font-extrabold">
              <span class="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">
                WaveChat
              </span>
            </h1>
          </div>
          <div class="flex gap-2">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-sun"></i></button>
            <button class="icon-btn" onclick="newChat()"><i class="fas fa-pen"></i></button>
          </div>
        </div>
        <!-- premium search -->
        <div class="mt-5 relative group">
          <i
            class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors"></i>
          <input type="text" placeholder="Search messages or people" id="searchInput"
            class="w-full pl-14 pr-5 py-4 rounded-3xl bg-surface outline-none transition-all group-focus-within:ring-4 group-focus-within:ring-blue-500/20"
            style="background: var(--bg-surface); color: var(--text-primary);">
        </div>
      </div>

      <!-- online friends with cool effects -->
      <div class="py-3 border-b border-light" style="border-color: var(--border-light);">
        <div class="flex justify-between px-6 mb-2">
          <span class="font-bold text-sm uppercase tracking-wider text-primary">online now</span>
          <span class="text-sm font-bold bg-primary-gradient px-3 py-1 rounded-full text-white"
            id="onlineCount">0</span>
        </div>
        <div class="online-strip" id="onlineUsers"></div>
      </div>

      <!-- conversations -->
      <div class="flex-1 overflow-y-auto scrollable py-3" id="conversationsList"></div>

      <!-- current user profile -->
      <div class="border-t p-5 flex items-center gap-4 group cursor-pointer hover:bg-hover transition-all"
        style="border-color: var(--border-light);">
        <div class="relative">
          <div class="avatar avatar-sm group-hover:rotate-12 transition-transform"><i class="fas fa-user"></i></div>
          <span class="status-badge online"></span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-extrabold text-lg truncate">Alex Morgan</div>
          <div class="text-sm text-secondary flex items-center gap-1.5">
            <i class="fas fa-circle text-success text-[8px]"></i>
            <span>Active now</span>
          </div>
        </div>
        <button class="icon-btn opacity-70 group-hover:opacity-100" onclick="showSettings()">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </aside>

    <!-- overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- MAIN CHAT AREA -->
    <main class="chat">
      <!-- chat header with glass -->
      <div class="flex items-center justify-between px-5 md:px-6 py-4 border-b chat-header sticky top-0"
        style="border-color: var(--border-light); z-index: 10; background: var(--bg-sidebar); backdrop-filter: var(--blur-intensity);">
        <div class="flex items-center gap-3 min-w-0">
          <button class="md:hidden icon-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <button class="hidden md:flex icon-btn" onclick="backToContacts()"><i class="fas fa-arrow-left"></i></button>
          <div class="relative group">
            <div class="avatar avatar-sm group-hover:rotate-12 transition-transform" id="currentUserAvatar">
              <i class="fas fa-user-friends"></i>
            </div>
            <span class="status-badge online" id="currentUserStatus"></span>
          </div>
          <div class="min-w-0">
            <h2 class="font-extrabold text-xl truncate" id="currentUserName">Select a chat</h2>
            <p class="text-sm text-secondary flex items-center gap-1.5" id="currentUserStatusText">
              <i class="fas fa-circle text-[8px] text-secondary"></i>
              pick from sidebar
            </p>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="icon-btn" onclick="startCall()"><i class="fas fa-phone"></i></button>
          <button class="icon-btn" onclick="startVideoCall()"><i class="fas fa-video"></i></button>
          <div class="relative">
            <button class="icon-btn" onclick="toggleChatMenu()"><i class="fas fa-ellipsis-v"></i></button>
            <div id="chatMenu"
              class="absolute right-0 top-14 w-48 bg-surface border rounded-3xl shadow-2xl z-30 hidden py-2"
              style="background: var(--bg-sidebar); border-color: var(--border-light);">
              <button onclick="viewProfile()"
                class="block w-full text-left px-5 py-3.5 hover:bg-hover transition-all hover:pl-7"><i
                  class="fas fa-user w-7"></i> Profile</button>
              <button onclick="muteChat()"
                class="block w-full text-left px-5 py-3.5 hover:bg-hover transition-all hover:pl-7"><i
                  class="fas fa-bell-slash w-7"></i> Mute</button>
              <button onclick="clearChat()"
                class="block w-full text-left px-5 py-3.5 hover:bg-hover transition-all hover:pl-7"><i
                  class="fas fa-trash w-7"></i> Clear</button>
              <div class="border-t my-2" style="border-color: var(--border-light);"></div>
              <button onclick="exportChat()"
                class="block w-full text-left px-5 py-3.5 hover:bg-hover transition-all hover:pl-7"><i
                  class="fas fa-download w-7"></i> Export</button>
            </div>
          </div>
        </div>
      </div>

      <!-- messages -->
      <div class="msg-panel scrollable" id="messagesContainer">
        <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-6">
          <div
            class="w-32 h-32 rounded-3xl bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 flex items-center justify-center mb-8 shadow-2xl animate-bounce">
            <i class="fas fa-comments text-5xl text-white"></i>
          </div>
          <h3
            class="text-4xl font-extrabold mb-3 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">
            Welcome to WaveChat
          </h3>
          <p class="text-secondary max-w-sm mb-10 text-lg">Connect with friends in style</p>
          <button onclick="newChat()"
            class="px-10 py-5 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white rounded-full font-bold text-lg shadow-2xl hover:shadow-3xl transform hover:scale-110 transition-all duration-300 flex items-center gap-3">
            <i class="fas fa-plus-circle"></i>
            Start new chat
          </button>
        </div>
        <div id="chatMessages" class="hidden w-full"></div>
      </div>

      <!-- input area -->
      <div class="input-area relative">
        <div class="input-wrapper">
          <button class="icon-btn" onclick="toggleAttachmentMenu()" id="attachButton"><i
              class="fas fa-plus"></i></button>
          <input type="text" class="msg-input" placeholder="Write a message..." id="messageInput" disabled>
          <button class="icon-btn send-btn" onclick="sendMessage()" id="sendButton" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>

        <!-- hidden file inputs -->
        <input type="file" id="photoInput" class="file-input-hidden" accept="image/*" multiple>
        <input type="file" id="fileInput" class="file-input-hidden" accept="*/*" multiple>
        <input type="file" id="locationInput" class="file-input-hidden" accept=".kml,.gpx,.geojson" multiple>

        <!-- attachment menu -->
        <div id="attachmentMenu" class="attach-menu hidden">
          <div class="attach-item" onclick="handlePhotoUpload()"><i class="fas fa-image"></i><span>Photo</span></div>
          <div class="attach-item" onclick="handleFileUpload()"><i class="fas fa-file"></i><span>File</span></div>
          <div class="attach-item" onclick="handleLocationUpload()"><i class="fas fa-map-pin"></i><span>Location</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- floating action button -->
  <div class="fab" id="mobileFab"><i class="fas fa-comment-dots text-3xl"></i></div>


</body>

</html>
