<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>WaveChat · modern messaging</title>
  <!-- Tailwind + Font Awesome 6 + Inter font + Glassmorphism effects -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ----- LIGHT THEME (modern) ----- */
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-hover: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border-light: #e2e8f0;
      --incoming-bubble: #f1f5f9;
      --outgoing-bubble: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 20px -6px rgba(37, 99, 235, 0.2);
      --shadow-lg: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --glass-bg: rgba(255, 255, 255, 0.7);
    }

    /* ----- DARK THEME (modern) ----- */
    [data-theme="dark"] {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #60a5fa;
      --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --bg-main: #0b1120;
      --bg-surface: #1e293b;
      --bg-sidebar: #0f172a;
      --bg-hover: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --border-light: #334155;
      --incoming-bubble: #1e293b;
      --outgoing-bubble: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      --shadow-md: 0 8px 20px -6px rgba(0, 0, 0, 0.6);
      --glass-bg: rgba(15, 23, 42, 0.7);
    }

    body {
      background: var(--bg-main);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* layout */
    .app {
      display: flex;
      height: 100%;
      max-width: 1600px;
      margin: 0 auto;
      background: var(--bg-main);
      position: relative;
    }

    /* ----- SIDEBAR (glass morphism) ----- */
    .sidebar {
      width: 360px;
      min-width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
      z-index: 50;
      will-change: transform;
      backdrop-filter: blur(10px);
    }

    @media (min-width: 769px) {
      .sidebar {
        box-shadow: var(--shadow-sm);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(85%, 340px);
        transform: translateX(-100%);
        box-shadow: var(--shadow-lg);
        border-right: none;
      }
      .sidebar.active {
        transform: translateX(0);
      }
    }

    /* chat area */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      min-width: 0;
      position: relative;
    }

    /* avatars with gradient */
    .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      background: var(--primary-gradient);
      color: white;
      border-radius: 16px;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .avatar:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-md);
    }

    .avatar-sm {
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
    }

    .avatar-md {
      width: 52px;
      height: 52px;
      font-size: 1.4rem;
    }

    .status-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--bg-sidebar);
      transition: all 0.2s;
    }

    .online {
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
    }

    .away {
      background: var(--warning);
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3);
    }

    .offline {
      background: var(--text-secondary);
    }

    .dnd {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.3);
    }

    /* conversation items with animation */
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin: 4px 12px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .conv-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: var(--primary-gradient);
      opacity: 0.1;
      transition: width 0.3s ease;
    }

    .conv-item:hover::before {
      width: 100%;
    }

    .conv-item:hover {
      transform: translateX(4px);
    }

    .conv-item.active {
      background: var(--bg-hover);
      border-left: 4px solid var(--primary);
      border-radius: 24px 16px 16px 24px;
      box-shadow: var(--shadow-sm);
    }

    .conv-item.active::before {
      width: 100%;
    }

    /* online strip with glass effect */
    .online-strip {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
      background: var(--glass-bg);
      backdrop-filter: blur(5px);
    }

    .online-strip::-webkit-scrollbar {
      height: 4px;
    }

    .online-strip::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 8px;
    }

    /* messages panel */
    .msg-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
      background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.03) 0%, transparent 30%);
    }

    .msg-row {
      display: flex;
      margin-bottom: 12px;
      animation: slideIn 0.3s ease;
    }

    .msg-row.out {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 70%;
      padding: 14px 20px;
      border-radius: 28px;
      font-size: 0.95rem;
      line-height: 1.5;
      box-shadow: var(--shadow-sm);
      word-wrap: break-word;
      transition: transform 0.2s;
      position: relative;
    }

    .bubble:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .bubble.in {
      background: var(--incoming-bubble);
      color: var(--text-primary);
      border-bottom-left-radius: 8px;
    }

    .bubble.out {
      background: var(--outgoing-bubble);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .attachment-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      margin-top: 8px;
      border: 1px solid var(--border-light);
    }

    .attachment-preview i {
      font-size: 1.4rem;
      color: var(--primary);
    }

    .attachment-preview span {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .time {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 6px;
      text-align: right;
      letter-spacing: 0.3px;
    }

    /* date divider with style */
    .date-divider {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .date-divider span {
      background: var(--primary-gradient);
      padding: 6px 20px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: white;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: var(--shadow-sm);
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 24px;
      background: var(--incoming-bubble);
      border-radius: 30px;
      width: fit-content;
      box-shadow: var(--shadow-sm);
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: typingPulse 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingPulse {
      0%,60%,100% { opacity: 0.4; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); background: var(--primary-light); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* message input with glass effect */
    .input-area {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border-light);
      padding: 16px 24px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-surface);
      border-radius: 60px;
      padding: 6px 6px 6px 24px;
      border: 2px solid transparent;
      transition: all 0.3s;
      box-shadow: var(--shadow-sm);
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
      transform: scale(1.02);
    }

    .msg-input {
      flex: 1;
      background: transparent;
      border: 0;
      padding: 14px 0;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
    }

    .msg-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .icon-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .icon-btn:hover::before {
      opacity: 0.1;
    }

    .icon-btn:hover {
      transform: scale(1.1);
      color: var(--primary);
    }

    .send-btn {
      background: var(--primary-gradient);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    .send-btn:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.5);
    }

    .send-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
      transform: none;
    }

    /* attachment menu with animation */
    .attach-menu {
      position: absolute;
      bottom: 90px;
      left: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      padding: 16px 32px;
      display: flex;
      gap: 40px;
      z-index: 40;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .attach-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px 0;
    }

    .attach-item:hover {
      transform: translateY(-4px);
    }

    .attach-item i {
      font-size: 1.8rem;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: transform 0.2s;
    }

    .attach-item:hover i {
      transform: scale(1.2);
    }

    /* hidden file input */
    .file-input-hidden {
      display: none;
    }

    /* mobile overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      z-index: 45;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* mobile fab with animation */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary-gradient);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      z-index: 49;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      visibility: hidden;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    .fab:hover {
      transform: scale(1.1) rotate(10deg);
    }

    @media (max-width: 768px) {
      .fab {
        opacity: 1;
        visibility: visible;
      }
    }

    /* scrollbar */
    .scrollable {
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }

    .scrollable::-webkit-scrollbar {
      width: 6px;
    }

    .scrollable::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollable::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
      opacity: 0.5;
    }

    /* welcome screen with animation */
    #welcomeScreen {
      animation: fadeScale 0.5s ease;
    }

    /* chat header with glass effect */
    .chat-header {
      backdrop-filter: blur(10px);
      background: var(--glass-bg) !important;
    }

    /* responsive tweaks */
    @media (max-width: 480px) {
      .bubble { max-width: 85%; font-size: 0.9rem; }
      .msg-panel { padding: 16px 12px; }
      .input-area { padding: 12px 16px; }
      .icon-btn { width: 44px; height: 44px; }
      .conv-item { margin: 2px 8px; padding: 10px 12px; }
      .avatar-sm { width: 40px; height: 40px; }
      .attach-menu { left: 12px; right: 12px; justify-content: center; gap: 24px; }
    }

    /* unread badge */
    .unread-badge {
      background: var(--primary-gradient);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    /* favorite star */
    .fav-star {
      position: absolute;
      top: -4px;
      right: -4px;
      color: #fbbf24;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      animation: starPulse 2s infinite;
    }

    @keyframes starPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>

<body data-theme="light">
  <div class="app">
    <!-- SIDEBAR with glass effect -->
    <aside class="sidebar" id="sidebar">
      <div class="p-5 border-b border-light" style="border-color: var(--border-light);">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 min-w-0">
            <div class="avatar avatar-md">
              <i class="fa-regular fa-comment"></i>
            </div>
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">WaveChat</h1>
          </div>
          <div class="flex gap-1 shrink-0">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-sun"></i></button>
            <button class="icon-btn" onclick="newChat()"><i class="fas fa-pen"></i></button>
          </div>
        </div>
        <!-- search with icon -->
        <div class="mt-4 relative">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-secondary"></i>
          <input type="text" placeholder="Search chats" id="searchInput"
            class="w-full pl-11 pr-4 py-3 rounded-2xl bg-surface outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
            style="background: var(--bg-surface); color: var(--text-primary);">
        </div>
      </div>

      <!-- online friends strip with glass -->
      <div class="py-2 border-b border-light" style="border-color: var(--border-light);">
        <div class="flex justify-between px-4 mb-1">
          <span class="font-semibold text-sm uppercase tracking-wider text-primary">online</span>
          <span class="text-xs font-bold text-secondary" id="onlineCount">0</span>
        </div>
        <div class="online-strip" id="onlineUsers"></div>
      </div>

      <!-- conversation list -->
      <div class="flex-1 overflow-y-auto scrollable py-2" id="conversationsList"></div>

      <!-- current user with gradient -->
      <div class="border-t p-4 flex items-center gap-3" style="border-color: var(--border-light);">
        <div class="relative">
          <div class="avatar avatar-sm"><i class="fas fa-user"></i></div>
          <span class="status-badge online"></span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-bold truncate">Alex Morgan</div>
          <div class="text-xs text-secondary truncate flex items-center gap-1">
            <i class="fas fa-circle text-success text-[6px]"></i> Active
          </div>
        </div>
        <button class="icon-btn" onclick="showSettings()"><i class="fas fa-cog"></i></button>
      </div>
    </aside>

    <!-- overlay (mobile) -->
    <div class="overlay" id="overlay"></div>

    <!-- MAIN CHAT -->
    <main class="chat">
      <!-- chat header with glass -->
      <div class="flex items-center justify-between px-4 md:px-5 py-3 border-b chat-header sticky top-0" style="border-color: var(--border-light); z-index: 10;">
        <div class="flex items-center gap-2 min-w-0">
          <button class="md:hidden icon-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <button class="hidden md:flex icon-btn" onclick="backToContacts()"><i class="fas fa-arrow-left"></i></button>
          <div class="relative">
            <div class="avatar avatar-sm" id="currentUserAvatar"><i class="fas fa-user-friends"></i></div>
            <span class="status-badge online" id="currentUserStatus"></span>
          </div>
          <div class="min-w-0">
            <h2 class="font-extrabold truncate text-lg" id="currentUserName">Select a chat</h2>
            <p class="text-xs text-secondary truncate flex items-center gap-1" id="currentUserStatusText">
              <i class="fas fa-circle text-[6px] text-secondary"></i> pick from sidebar
            </p>
          </div>
        </div>
        <div class="flex gap-1 shrink-0">
          <button class="icon-btn" onclick="startCall()"><i class="fas fa-phone"></i></button>
          <button class="icon-btn" onclick="startVideoCall()"><i class="fas fa-video"></i></button>
          <div class="relative">
            <button class="icon-btn" onclick="toggleChatMenu()"><i class="fas fa-ellipsis-v"></i></button>
            <div id="chatMenu" class="absolute right-0 top-12 w-44 bg-surface border rounded-2xl shadow-lg z-30 hidden" style="background: var(--bg-sidebar); border-color: var(--border-light);">
              <button onclick="viewProfile()" class="block w-full text-left px-4 py-3 hover:bg-hover rounded-t-2xl transition"><i class="fas fa-user w-6"></i> Profile</button>
              <button onclick="muteChat()" class="block w-full text-left px-4 py-3 hover:bg-hover"><i class="fas fa-bell-slash w-6"></i> Mute</button>
              <button onclick="clearChat()" class="block w-full text-left px-4 py-3 hover:bg-hover"><i class="fas fa-trash w-6"></i> Clear</button>
              <div class="border-t my-1" style="border-color: var(--border-light);"></div>
              <button onclick="exportChat()" class="block w-full text-left px-4 py-3 hover:bg-hover rounded-b-2xl"><i class="fas fa-download w-6"></i> Export</button>
            </div>
          </div>
        </div>
      </div>

      <!-- messages container -->
      <div class="msg-panel scrollable" id="messagesContainer">
        <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-4">
          <div class="w-28 h-28 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mb-6 shadow-lg">
            <i class="fas fa-comments text-5xl text-white"></i>
          </div>
          <h3 class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Welcome to WaveChat</h3>
          <p class="text-secondary max-w-xs mb-8">Start messaging with colleagues and friends</p>
          <button onclick="newChat()" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-full font-bold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300">
            <i class="fas fa-plus mr-2"></i>New chat
          </button>
        </div>
        <div id="chatMessages" class="hidden w-full"></div>
      </div>

      <!-- input footer with glass -->
      <div class="input-area relative">
        <div class="input-wrapper">
          <button class="icon-btn" onclick="toggleAttachmentMenu()" id="attachButton"><i class="fas fa-plus"></i></button>
          <input type="text" class="msg-input" placeholder="Type a message" id="messageInput" disabled>
          <button class="icon-btn send-btn" onclick="sendMessage()" id="sendButton" disabled><i class="fas fa-paper-plane"></i></button>
        </div>

        <!-- hidden file inputs -->
        <input type="file" id="photoInput" class="file-input-hidden" accept="image/*" multiple>
        <input type="file" id="fileInput" class="file-input-hidden" accept="*/*" multiple>
        <input type="file" id="locationInput" class="file-input-hidden" accept=".kml,.gpx,.geojson" multiple>

        <!-- attachment menu with glass -->
        <div id="attachmentMenu" class="attach-menu hidden">
          <div class="attach-item" onclick="handlePhotoUpload()"><i class="fas fa-image"></i><span>Photo</span></div>
          <div class="attach-item" onclick="handleFileUpload()"><i class="fas fa-file"></i><span>File</span></div>
          <div class="attach-item" onclick="handleLocationUpload()"><i class="fas fa-map-pin"></i><span>Location</span></div>
        </div>
      </div>
    </main>
  </div>

  <!-- mobile fab with animation -->
  <div class="fab" id="mobileFab"><i class="fas fa-comment-dots text-2xl"></i></div>

  <script>
    (function () {
      // ---------- ENHANCED DEMO DATA ----------
      const users = [
        { id: 1, name: "John Doe", avatarIcon: "user-tie", status: "online", lastSeen: "just now", lastMessage: "Check out this photo", unread: 0, isFavorite: false },
        { id: 2, name: "Alice Smith", avatarIcon: "user-graduate", status: "online", lastSeen: "2 min ago", lastMessage: "Can we meet tomorrow?", unread: 3, isFavorite: true },
        { id: 3, name: "Mike Johnson", avatarIcon: "user-ninja", status: "away", lastSeen: "30 min", lastMessage: "Project files sent", unread: 0, isFavorite: false },
        { id: 4, name: "Sarah Brown", avatarIcon: "user-astronaut", status: "offline", lastSeen: "2 hours", lastMessage: "thanks for the help", unread: 1, isFavorite: true },
        { id: 5, name: "Team Work", avatarIcon: "users", status: "online", lastSeen: "yesterday", lastMessage: "meeting at 3pm", unread: 5, isFavorite: false },
        { id: 6, name: "Emma Davis", avatarIcon: "user-secret", status: "dnd", lastSeen: "5 min", lastMessage: "quick call?", unread: 2, isFavorite: true }
      ];

      const chatMessages = {
        1: [
          { id: 1, type: "text", content: "Hey there! How are you doing today?", incoming: true, time: "10:30 AM" },
          { id: 2, type: "text", content: "I'm doing great! Working on the new chat UI.", incoming: false, time: "10:32 AM" },
          { id: 3, type: "text", content: "Check out this design", incoming: true, time: "10:35 AM" }
        ],
        2: [
          { id: 1, type: "text", content: "Hi Alice! How's your day?", incoming: false, time: "9:15 AM" },
          { id: 2, type: "text", content: "Going well! Can we meet tomorrow for coffee?", incoming: true, time: "9:20 AM" }
        ],
        4: [
          { id: 1, type: "text", content: "Thanks for your help with the presentation!", incoming: true, time: "2 hours ago" },
          { id: 2, type: "text", content: "You're welcome, happy to help", incoming: false, time: "1 hour ago" }
        ]
      };

      // state
      let currentChatId = null, currentUser = null, isMobile = window.innerWidth < 768, isDark = false;
      const els = {
        body: document.body,
        sidebar: document.getElementById('sidebar'),
        overlay: document.getElementById('overlay'),
        themeToggle: document.getElementById('themeToggle'),
        onlineUsers: document.getElementById('onlineUsers'),
        conversationsList: document.getElementById('conversationsList'),
        welcomeScreen: document.getElementById('welcomeScreen'),
        chatMessages: document.getElementById('chatMessages'),
        messagesContainer: document.getElementById('messagesContainer'),
        currentUserName: document.getElementById('currentUserName'),
        currentUserAvatar: document.getElementById('currentUserAvatar'),
        currentUserStatus: document.getElementById('currentUserStatus'),
        currentUserStatusText: document.getElementById('currentUserStatusText'),
        messageInput: document.getElementById('messageInput'),
        sendButton: document.getElementById('sendButton'),
        attachmentMenu: document.getElementById('attachmentMenu'),
        chatMenu: document.getElementById('chatMenu'),
        searchInput: document.getElementById('searchInput'),
        onlineCount: document.getElementById('onlineCount'),
        mobileFab: document.getElementById('mobileFab'),
        photoInput: document.getElementById('photoInput'),
        fileInput: document.getElementById('fileInput'),
        locationInput: document.getElementById('locationInput')
      };

      const getTime = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      function loadOnlineUsers() {
        const online = users.filter(u => u.status === 'online');
        els.onlineCount.innerText = online.length;
        els.onlineUsers.innerHTML = '';
        online.forEach(u => {
          const div = document.createElement('div');
          div.className = 'flex flex-col items-center cursor-pointer transform transition hover:scale-110';
          div.onclick = () => selectChat(u.id);
          div.innerHTML = `<div class="relative"><div class="avatar avatar-sm"><i class="fas fa-${u.avatarIcon}"></i></div><span class="status-badge online"></span></div><span class="text-xs font-semibold mt-1 max-w-[64px] truncate">${u.name.split(' ')[0]}</span>`;
          els.onlineUsers.appendChild(div);
        });
      }

      function loadConversations() {
        els.conversationsList.innerHTML = '';
        users.forEach(u => {
          const div = document.createElement('div');
          div.className = `conv-item ${currentChatId === u.id ? 'active' : ''}`;
          div.setAttribute('data-userid', u.id);
          div.onclick = () => selectChat(u.id);
          const favStar = u.isFavorite ? '<i class="fas fa-star fav-star"></i>' : '';
          div.innerHTML = `
            <div class="relative">
              <div class="avatar avatar-sm"><i class="fas fa-${u.avatarIcon}"></i></div>
              <span class="status-badge ${u.status}"></span>
              ${favStar}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-center gap-1">
                <span class="font-bold truncate">${u.name}</span>
                <span class="text-xs text-secondary whitespace-nowrap">${u.lastSeen}</span>
              </div>
              <p class="text-sm text-secondary truncate">${u.lastMessage}</p>
            </div>
            ${u.unread ? '<span class="unread-badge">' + u.unread + '</span>' : ''}`;
          els.conversationsList.appendChild(div);
        });
      }

      function selectChat(id) {
        currentChatId = id;
        currentUser = users.find(u => u.id === id);
        if (!currentUser) return;
        els.currentUserName.innerText = currentUser.name;
        els.currentUserAvatar.innerHTML = `<i class="fas fa-${currentUser.avatarIcon}"></i>`;
        els.currentUserStatus.className = `status-badge ${currentUser.status}`;
        els.currentUserStatusText.innerHTML = `<i class="fas fa-circle text-[6px] ${currentUser.status}"></i> ${currentUser.status === 'online' ? 'Active' : 'seen ' + currentUser.lastSeen}`;
        els.welcomeScreen.classList.add('hidden');
        els.chatMessages.classList.remove('hidden');
        els.messageInput.disabled = false;
        els.messageInput.placeholder = `Message ${currentUser.name}`;
        loadChatMessages();
        updateActive();
        if (isMobile) closeSidebar();
      }

      function loadChatMessages() {
        els.chatMessages.innerHTML = '';
        const msgs = chatMessages[currentChatId] || [];
        const div = document.createElement('div'); div.className = 'date-divider'; div.innerHTML = '<span>Today</span>';
        els.chatMessages.appendChild(div);
        msgs.forEach(m => els.chatMessages.appendChild(createMsgEl(m)));
        els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
      }

      function createMsgEl(m) {
        const row = document.createElement('div');
        row.className = `msg-row ${m.incoming ? '' : 'out'}`;

        let content = m.content;
        if (m.attachment) {
          content = `
            <div class="attachment-preview">
              <i class="fas ${m.attachment.icon}"></i>
              <span class="font-medium">${m.attachment.name}</span>
            </div>
            <div class="mt-1">${m.content || ''}</div>
          `;
        }

        let inner = `<div class="bubble ${m.incoming ? 'in' : 'out'}">${content}<div class="time">${m.time}</div></div>`;

        if (m.incoming && currentUser) {
          row.innerHTML = `<div class="avatar avatar-sm mr-2"><i class="fas fa-${currentUser.avatarIcon}"></i></div>${inner}`;
        } else {
          row.innerHTML = inner;
        }
        return row;
      }

      function updateActive() {
        document.querySelectorAll('.conv-item').forEach(el => {
          const uid = el.getAttribute('data-userid');
          if (Number(uid) === currentChatId) el.classList.add('active'); else el.classList.remove('active');
        });
      }

      function sendMessage() {
        if (!currentChatId || !els.messageInput.value.trim()) return;
        const text = els.messageInput.value.trim();
        const newMsg = { id: Date.now(), type: 'text', content: text, incoming: false, time: getTime() };
        els.chatMessages.appendChild(createMsgEl(newMsg));
        els.messageInput.value = '';
        els.sendButton.disabled = true;
        els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;

        // Simulate reply with typing
        setTimeout(() => {
          const typingDiv = document.createElement('div');
          typingDiv.className = 'msg-row';
          typingDiv.id = 'typing';
          typingDiv.innerHTML = `<div class="avatar avatar-sm mr-2"><i class="fas fa-${currentUser.avatarIcon}"></i></div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
          els.chatMessages.appendChild(typingDiv);
          els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
          setTimeout(() => {
            document.getElementById('typing')?.remove();
            const reply = { id: Date.now() + 1, type: 'text', content: 'Got it. Thanks! 👋', incoming: true, time: getTime() };
            els.chatMessages.appendChild(createMsgEl(reply));
            els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
          }, 1500);
        }, 800);
      }

      function handleFileSelect(input, type) {
        const files = input.files;
        if (!files || files.length === 0 || !currentChatId) return;

        Array.from(files).forEach(file => {
          const icon = type === 'photo' ? 'fa-image' : (type === 'location' ? 'fa-map-pin' : 'fa-file');
          const newMsg = {
            id: Date.now() + Math.random(),
            type: 'attachment',
            content: `<i class="fas ${icon}"></i> ${file.name}`,
            attachment: {
              name: file.name,
              size: file.size,
              type: file.type,
              icon: icon
            },
            incoming: false,
            time: getTime()
          };
          els.chatMessages.appendChild(createMsgEl(newMsg));
        });

        els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
        input.value = '';
      }

      // Attachment handlers
      window.handlePhotoUpload = function() { els.attachmentMenu.classList.add('hidden'); els.photoInput.click(); };
      window.handleFileUpload = function() { els.attachmentMenu.classList.add('hidden'); els.fileInput.click(); };
      window.handleLocationUpload = function() { els.attachmentMenu.classList.add('hidden'); els.locationInput.click(); };

      function toggleSidebar() {
        els.sidebar.classList.toggle('active');
        els.overlay.classList.toggle('active');
        document.body.style.overflow = els.sidebar.classList.contains('active') ? 'hidden' : '';
      }
      function closeSidebar() {
        els.sidebar.classList.remove('active');
        els.overlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      function toggleTheme() {
        isDark = !isDark;
        els.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
        els.themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        localStorage.setItem('wavechat-theme', isDark ? 'dark' : 'light');
      }

      const saved = localStorage.getItem('wavechat-theme');
      if (saved === 'dark') { isDark = true; els.body.setAttribute('data-theme', 'dark'); els.themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; }

      // Event listeners
      els.themeToggle.addEventListener('click', toggleTheme);
      els.messageInput.addEventListener('input', function () { els.sendButton.disabled = this.value.trim() === ''; });
      els.messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && els.messageInput.value.trim()) { e.preventDefault(); sendMessage(); } });
      els.searchInput.addEventListener('input', function (e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.conv-item').forEach((item, idx) => {
          const user = users[idx];
          if (user) item.style.display = (user.name.toLowerCase().includes(term) || user.lastMessage.toLowerCase().includes(term) || term === '') ? 'flex' : 'none';
        });
      });
      els.overlay.addEventListener('click', closeSidebar);
      els.mobileFab.addEventListener('click', toggleSidebar);

      els.photoInput.addEventListener('change', function() { handleFileSelect(this, 'photo'); });
      els.fileInput.addEventListener('change', function() { handleFileSelect(this, 'file'); });
      els.locationInput.addEventListener('change', function() { handleFileSelect(this, 'location'); });

      window.addEventListener('resize', () => {
        isMobile = window.innerWidth < 768;
        if (!isMobile) closeSidebar();
      });

      document.addEventListener('click', (e) => {
        if (!els.chatMenu.contains(e.target) && !e.target.closest('[onclick="toggleChatMenu()"]')) {
          els.chatMenu.classList.add('hidden');
        }
        if (!els.attachmentMenu.contains(e.target) && !e.target.closest('[onclick="toggleAttachmentMenu()"]') && !e.target.closest('[onclick^="handle"]')) {
          els.attachmentMenu.classList.add('hidden');
        }
      });

      // Initialize
      loadOnlineUsers();
      loadConversations();

      // Expose globals
      window.selectChat = selectChat;
      window.toggleSidebar = toggleSidebar;
      window.backToContacts = toggleSidebar;
      window.newChat = () => alert('✨ Start new conversation');
      window.showSettings = () => alert('⚙️ Settings panel');
      window.startCall = () => currentUser ? alert(`📞 Calling ${currentUser.name}...`) : alert('Select a chat first');
      window.startVideoCall = () => currentUser ? alert(`📹 Video call with ${currentUser.name}`) : alert('Select a chat first');
      window.toggleChatMenu = () => els.chatMenu.classList.toggle('hidden');
      window.toggleAttachmentMenu = () => els.attachmentMenu.classList.toggle('hidden');
      window.viewProfile = () => { alert(`👤 ${currentUser?.name}'s profile`); els.chatMenu.classList.add('hidden'); };
      window.muteChat = () => { alert('🔇 Chat muted'); els.chatMenu.classList.add('hidden'); };
      window.clearChat = () => { if (confirm('Clear all messages?')) { els.chatMessages.innerHTML = '<div class="date-divider"><span>Today</span></div>'; } els.chatMenu.classList.add('hidden'); };
      window.exportChat = () => { alert('📥 Exporting chat...'); els.chatMenu.classList.add('hidden'); };
      window.sendMessage = sendMessage;
    })();
  </script>
</body>
</html>
