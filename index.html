<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>WaveChat · Complete Messaging Solution</title>
  <!-- Tailwind + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
</head>
<body data-theme="light">
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="p-5 border-b border-light">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="avatar avatar-md"><i class="fa-regular fa-comment"></i></div>
          <h1 class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">WaveChat</h1>
        </div>
        <div class="flex gap-2">
          <button class="icon-btn" id="themeToggle"><i class="fas fa-sun"></i></button>
          <button class="icon-btn" id="authBtn"><i class="fas fa-sign-in-alt"></i></button>
        </div>
      </div>
      <div class="relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-secondary"></i>
        <input type="text" placeholder="Search conversations..." id="searchInput" class="w-full pl-12 pr-4 py-3 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 border border-light" style="background: var(--bg-surface);">
      </div>
    </div>
    <div class="py-2 border-b border-light">
      <div class="flex justify-between px-4 mb-2"><span class="font-bold text-sm uppercase">Online</span><span class="text-sm font-bold text-primary" id="onlineCount">0</span></div>
      <div class="online-strip" id="onlineUsers"></div>
    </div>
    <div class="flex-1 overflow-y-auto py-3" id="conversationsList"></div>
    <div class="border-t p-4 flex items-center gap-3 cursor-pointer hover:bg-hover transition" id="profileBtn">
      <div class="relative"><div class="avatar avatar-sm" id="currentUserAvatar"><i class="fas fa-user"></i></div><span class="status-badge online" id="currentUserStatus"></span></div>
      <div class="flex-1 min-w-0"><div class="font-bold truncate" id="currentUserDisplayName">Guest User</div><div class="text-xs text-secondary truncate" id="currentUserEmail">Click to login</div></div>
      <i class="fas fa-chevron-right text-secondary"></i>
    </div>
  </aside>
  <div class="overlay hidden" id="overlay"></div>

  <main class="chat">
    <div class="flex items-center justify-between px-4 md:px-6 py-4 border-b bg-surface/80 backdrop-blur-lg sticky top-0 z-10" style="border-color: var(--border-light);">
      <div class="flex items-center gap-3 min-w-0">
        <button class="md:hidden icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="relative"><div class="avatar avatar-sm" id="chatUserAvatar"><i class="fas fa-user-friends"></i></div><span class="status-badge online" id="chatUserStatus"></span></div>
        <div class="min-w-0"><h2 class="font-bold text-lg truncate" id="chatUserName">Select a chat</h2><p class="text-xs text-secondary truncate" id="chatUserStatusText">Click to start messaging</p></div>
      </div>
      <div class="flex gap-1"><button class="icon-btn" id="audioCallBtn"><i class="fas fa-phone"></i></button><button class="icon-btn" id="videoCallBtn"><i class="fas fa-video"></i></button></div>
    </div>

    <div class="msg-panel" id="messagesContainer">
      <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-6">
        <div class="w-28 h-28 rounded-3xl bg-gradient-to-br from-blue-500 to-pink-500 flex items-center justify-center mb-6 shadow-xl"><i class="fas fa-comments text-5xl text-white"></i></div>
        <h3 class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-blue-600 to-pink-600 bg-clip-text text-transparent">Welcome to WaveChat</h3>
        <p class="text-secondary max-w-sm mb-8">Sign in to start messaging with friends</p>
        <button id="welcomeSignIn" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-pink-600 text-white rounded-full font-bold shadow-lg hover:shadow-xl transform hover:scale-105 transition"><i class="fas fa-sign-in-alt mr-2"></i>Sign In</button>
      </div>
      <div id="chatMessages" class="hidden w-full space-y-2"></div>
    </div>

    <div class="input-area relative">
      <div class="input-wrapper">
        <button class="icon-btn" id="attachBtn"><i class="fas fa-plus"></i></button>
        <input type="text" class="msg-input" placeholder="Type a message..." id="messageInput" disabled>
        <button class="icon-btn send-btn" id="sendButton" disabled><i class="fas fa-paper-plane"></i></button>
      </div>
      <div id="attachmentMenu" class="attach-menu hidden">
        <div class="attach-item" id="photoAttach"><i class="fas fa-image"></i><span>Photo</span></div>
        <div class="attach-item" id="fileAttach"><i class="fas fa-file"></i><span>File</span></div>
        <div class="attach-item" id="locationAttach"><i class="fas fa-map-marker-alt"></i><span>Location</span></div>
      </div>
    </div>
  </main>
</div>

<!-- MODALS -->
<div class="auth-modal" id="authModal">
  <div class="auth-container">
    <div class="auth-tabs flex gap-3 mb-6 border-b pb-3">
      <div class="auth-tab flex-1 text-center py-2 font-semibold cursor-pointer active" data-tab="login">Login</div>
      <div class="auth-tab flex-1 text-center py-2 font-semibold cursor-pointer" data-tab="register">Register</div>
    </div>
    <div id="loginForm" class="auth-form active"><input type="email" class="auth-input w-full mb-3" placeholder="Email" id="loginEmail" value="demo@wavechat.com"><input type="password" class="auth-input w-full mb-3" placeholder="Password" id="loginPassword" value="demo123"><button id="doLogin" class="auth-btn w-full p-3 rounded-xl bg-gradient-to-r from-blue-600 to-pink-600 text-white font-bold">Sign In</button><p class="text-center mt-4 text-sm text-secondary"><i class="fas fa-info-circle"></i> Use any email/password for demo</p></div>
    <div id="registerForm" class="auth-form hidden"><input type="text" class="auth-input w-full mb-3" placeholder="Display Name" id="registerName" value="Demo User"><input type="email" class="auth-input w-full mb-3" placeholder="Email" id="registerEmail" value="demo@wavechat.com"><input type="password" class="auth-input w-full mb-3" placeholder="Password" id="registerPassword" value="demo123"><button id="doRegister" class="auth-btn w-full p-3 rounded-xl bg-gradient-to-r from-blue-600 to-pink-600 text-white font-bold">Create Account</button></div>
  </div>
</div>

<div class="call-modal" id="incomingCallModal"><div class="call-container max-w-md"><div class="p-8 text-center"><div class="avatar avatar-lg mx-auto mb-4" id="incomingCallAvatar"><i class="fas fa-user"></i></div><h3 class="text-2xl font-bold mb-2" id="incomingCallName">John Doe</h3><p class="text-secondary mb-6" id="incomingCallType">Incoming video call...</p><div class="flex gap-4 justify-center"><button class="call-btn success" id="acceptCallBtn"><i class="fas fa-phone"></i></button><button class="call-btn danger" id="declineCallBtn"><i class="fas fa-phone-slash"></i></button></div></div></div></div>

<div class="call-modal" id="callModal"><div class="call-container"><div class="call-header flex justify-between p-4 border-b"><div class="flex gap-3"><div class="avatar avatar-sm" id="callUserAvatar"><i class="fas fa-user"></i></div><div><h3 class="font-bold" id="callUserName">Calling...</h3><p class="text-sm" id="callStatus">Connecting</p></div></div><button class="icon-btn" id="minimizeCallBtn"><i class="fas fa-minus"></i></button></div><div class="call-videos"><div class="video-container remote-video"><video class="video-element" id="remoteVideo" autoplay playsinline></video><div class="video-label">Remote</div></div><div class="video-container local-video"><video class="video-element" id="localVideo" autoplay playsinline muted></video><div class="video-label">You</div></div></div><div class="call-controls"><button class="call-btn" id="callMuteBtn"><i class="fas fa-microphone"></i></button><button class="call-btn" id="callVideoBtn"><i class="fas fa-video"></i></button><button class="call-btn" id="shareScreenBtn"><i class="fas fa-desktop"></i></button><button class="call-btn danger" id="endCallBtn"><i class="fas fa-phone-slash"></i></button><div class="call-timer" id="callTimer">00:00</div></div></div></div>

<input type="file" id="photoInput" class="hidden" accept="image/*"><input type="file" id="fileInput" class="hidden" accept="*/*">

<script>
(function() {
  // ==================== STATE ====================
  let currentUser = null;
  let currentChatId = null;
  let currentChatUser = null;
  let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
  
  // Load data from localStorage
  let messages = JSON.parse(localStorage.getItem('wavechat_messages')) || {};
  let conversations = JSON.parse(localStorage.getItem('wavechat_conversations')) || {};
  
  const users = [
    { id: 'user1', name: 'John Doe', avatar: 'user-tie', status: 'online', lastSeen: 'now', email: 'john@example.com' },
    { id: 'user2', name: 'Alice Smith', avatar: 'user-graduate', status: 'online', lastSeen: '2m', email: 'alice@example.com' },
    { id: 'user3', name: 'Mike Johnson', avatar: 'user-ninja', status: 'away', lastSeen: '30m', email: 'mike@example.com' },
    { id: 'user4', name: 'Sarah Brown', avatar: 'user-astronaut', status: 'offline', lastSeen: '2h', email: 'sarah@example.com' }
  ];
  
  // Initialize default data if empty
  if (Object.keys(conversations).length === 0) {
    users.forEach(u => { 
      conversations[`conv_${u.id}`] = { 
        userId: u.id, 
        lastMessage: u.id === 'user1' ? 'Hey! How are you?' : 'Hello!', 
        lastMessageTime: new Date().toISOString(), 
        unreadCount: u.id === 'user1' ? 1 : 0 
      }; 
    });
    localStorage.setItem('wavechat_conversations', JSON.stringify(conversations));
  }
  
  if (Object.keys(messages).length === 0) {
    messages['conv_user1'] = [
      { id: 1, text: 'Hey! How are you?', sender: 'user1', time: '10:30 AM', type: 'text' },
      { id: 2, text: 'Welcome to WaveChat! This is a demo message.', sender: 'user1', time: '10:31 AM', type: 'text' }
    ];
    messages['conv_user2'] = [
      { id: 1, text: 'Hi there! Ready to chat?', sender: 'user2', time: '9:15 AM', type: 'text' }
    ];
    localStorage.setItem('wavechat_messages', JSON.stringify(messages));
  }
  
  // Call state
  let localStream = null;
  let callTimerInterval = null;
  let callSeconds = 0;
  let isCallMuted = false;
  let isVideoEnabled = true;
  
  // DOM Elements
  const els = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('overlay'),
    themeToggle: document.getElementById('themeToggle'),
    authBtn: document.getElementById('authBtn'),
    onlineUsers: document.getElementById('onlineUsers'),
    conversationsList: document.getElementById('conversationsList'),
    welcomeScreen: document.getElementById('welcomeScreen'),
    chatMessages: document.getElementById('chatMessages'),
    messagesContainer: document.getElementById('messagesContainer'),
    currentUserAvatar: document.getElementById('currentUserAvatar'),
    currentUserDisplayName: document.getElementById('currentUserDisplayName'),
    currentUserEmail: document.getElementById('currentUserEmail'),
    currentUserStatus: document.getElementById('currentUserStatus'),
    chatUserName: document.getElementById('chatUserName'),
    chatUserAvatar: document.getElementById('chatUserAvatar'),
    chatUserStatus: document.getElementById('chatUserStatus'),
    chatUserStatusText: document.getElementById('chatUserStatusText'),
    messageInput: document.getElementById('messageInput'),
    sendButton: document.getElementById('sendButton'),
    attachBtn: document.getElementById('attachBtn'),
    audioCallBtn: document.getElementById('audioCallBtn'),
    videoCallBtn: document.getElementById('videoCallBtn'),
    attachmentMenu: document.getElementById('attachmentMenu'),
    searchInput: document.getElementById('searchInput'),
    onlineCount: document.getElementById('onlineCount'),
    authModal: document.getElementById('authModal'),
    loginEmail: document.getElementById('loginEmail'),
    loginPassword: document.getElementById('loginPassword'),
    registerName: document.getElementById('registerName'),
    registerEmail: document.getElementById('registerEmail'),
    registerPassword: document.getElementById('registerPassword'),
    incomingCallModal: document.getElementById('incomingCallModal'),
    incomingCallAvatar: document.getElementById('incomingCallAvatar'),
    incomingCallName: document.getElementById('incomingCallName'),
    incomingCallType: document.getElementById('incomingCallType'),
    callModal: document.getElementById('callModal'),
    callUserName: document.getElementById('callUserName'),
    callUserAvatar: document.getElementById('callUserAvatar'),
    callStatus: document.getElementById('callStatus'),
    localVideo: document.getElementById('localVideo'),
    remoteVideo: document.getElementById('remoteVideo'),
    callMuteBtn: document.getElementById('callMuteBtn'),
    callVideoBtn: document.getElementById('callVideoBtn'),
    callTimer: document.getElementById('callTimer'),
    photoInput: document.getElementById('photoInput'),
    fileInput: document.getElementById('fileInput')
  };
  
  // Helper Functions
  function showToast(msg) { 
    const t = document.createElement('div'); 
    t.className = 'toast'; 
    t.textContent = msg; 
    document.body.appendChild(t); 
    setTimeout(() => t.remove(), 2800); 
  }
  
  function scrollToBottom() { 
    setTimeout(() => { 
      if (els.messagesContainer) els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight; 
    }, 50); 
  }
  
  function updateUI() { 
    if (currentUser) { 
      els.currentUserDisplayName.textContent = currentUser.displayName; 
      els.currentUserEmail.textContent = currentUser.email; 
      els.currentUserAvatar.innerHTML = '<i class="fas fa-user"></i>'; 
      els.authBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i>'; 
    } else { 
      els.currentUserDisplayName.textContent = 'Guest User'; 
      els.currentUserEmail.textContent = 'Click to login'; 
      els.authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i>'; 
    } 
  }
  
  function enableChat(enabled) { 
    els.messageInput.disabled = !enabled; 
    els.sendButton.disabled = !enabled; 
    els.attachBtn.disabled = !enabled; 
    els.audioCallBtn.disabled = !enabled; 
    els.videoCallBtn.disabled = !enabled; 
    if (!enabled) els.messageInput.placeholder = 'Sign in to chat'; 
  }
  
  // Load and display conversations
  function loadConversations() { 
    if (!currentUser && !isLoggedIn) {
      els.conversationsList.innerHTML = '<div class="text-center text-secondary p-8">Please login to see conversations</div>';
      return;
    }
    els.conversationsList.innerHTML = ''; 
    Object.entries(conversations).forEach(([cid, data]) => { 
      const u = users.find(u => u.id === data.userId); 
      if (u) addConvItem(cid, u, data); 
    }); 
  }
  
  function addConvItem(cid, user, data) { 
    const div = document.createElement('div'); 
    div.className = `conv-item ${currentChatId === cid ? 'active' : ''}`; 
    div.setAttribute('data-convid', cid); 
    div.onclick = () => selectChat(cid, user); 
    const unread = data.unreadCount || 0; 
    div.innerHTML = `<div class="relative"><div class="avatar avatar-sm"><i class="fas fa-${user.avatar}"></i></div><span class="status-badge ${user.status}"></span></div><div class="flex-1 min-w-0"><div class="flex justify-between"><span class="font-bold truncate">${user.name}</span><span class="text-xs opacity-70">${user.lastSeen}</span></div><p class="text-sm opacity-70 truncate">${(data.lastMessage || 'Say hello!').substring(0, 40)}</p></div>${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}`; 
    els.conversationsList.appendChild(div); 
  }
  
  function selectChat(cid, user) { 
    currentChatId = cid; 
    currentChatUser = user; 
    els.chatUserName.textContent = user.name; 
    els.chatUserAvatar.innerHTML = `<i class="fas fa-${user.avatar}"></i>`; 
    els.chatUserStatus.className = `status-badge ${user.status}`; 
    els.chatUserStatusText.textContent = user.status === 'online' ? 'Online' : 'Offline'; 
    els.welcomeScreen.classList.add('hidden'); 
    els.chatMessages.classList.remove('hidden'); 
    els.messageInput.disabled = false; 
    
    if (conversations[cid]?.unreadCount) { 
      conversations[cid].unreadCount = 0; 
      localStorage.setItem('wavechat_conversations', JSON.stringify(conversations)); 
      loadConversations(); 
    } 
    loadMessages(cid); 
    
    document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-convid') === cid)); 
    if (window.innerWidth < 768) closeSidebar(); 
  }
  
  function loadMessages(cid) { 
    els.chatMessages.innerHTML = ''; 
    const msgs = messages[cid] || []; 
    msgs.forEach(msg => displayMsg(msg)); 
    scrollToBottom(); 
  }
  
  function displayMsg(msg) { 
    const isOut = msg.sender === 'current'; 
    const row = document.createElement('div'); 
    row.className = `msg-row ${isOut ? 'out' : ''}`; 
    let content = escapeHtml(msg.text); 
    if (msg.type === 'image') content = `<img src="${msg.text}" class="max-w-full rounded-xl max-h-56 cursor-pointer" onclick="window.open(this.src)">`; 
    else if (msg.type === 'location') content = `<i class="fas fa-map-marker-alt mr-1"></i><a href="${msg.text}" target="_blank" class="underline">My Location</a>`; 
    else if (msg.type === 'file') content = `<i class="fas fa-paperclip mr-1"></i>${escapeHtml(msg.text)}`; 
    
    if (!isOut && currentChatUser) row.innerHTML = `<div class="avatar avatar-sm mr-2"><i class="fas fa-${currentChatUser.avatar}"></i></div><div class="bubble in">${content}<div class="message-time">${msg.time}</div></div>`; 
    else row.innerHTML = `<div class="bubble out">${content}<div class="message-time">${msg.time}</div></div>`; 
    els.chatMessages.appendChild(row); 
    scrollToBottom(); 
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
  
  function saveAndSend(text, type = 'text', rawUrl = null) { 
    if (!text.trim() || !currentChatId || !currentUser) return; 
    const newMsg = { id: Date.now(), text: rawUrl || text, sender: 'current', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), type }; 
    displayMsg(newMsg); 
    if (!messages[currentChatId]) messages[currentChatId] = []; 
    messages[currentChatId].push(newMsg); 
    localStorage.setItem('wavechat_messages', JSON.stringify(messages)); 
    
    if (conversations[currentChatId]) { 
      conversations[currentChatId].lastMessage = text.substring(0, 40); 
      conversations[currentChatId].lastMessageTime = new Date().toISOString(); 
      localStorage.setItem('wavechat_conversations', JSON.stringify(conversations)); 
      loadConversations(); 
    } 
    
    // Auto-reply simulation
    setTimeout(() => { 
      const reply = { id: Date.now() + 1, text: 'Thanks for your message! 👍', sender: currentChatUser.id, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), type: 'text' }; 
      displayMsg(reply); 
      messages[currentChatId].push(reply); 
      localStorage.setItem('wavechat_messages', JSON.stringify(messages)); 
      if (conversations[currentChatId]) { 
        conversations[currentChatId].unreadCount = (conversations[currentChatId].unreadCount || 0) + 1; 
        localStorage.setItem('wavechat_conversations', JSON.stringify(conversations)); 
        loadConversations(); 
      } 
    }, 1500); 
  }
  
  function sendMessage() { 
    const txt = els.messageInput.value.trim(); 
    if (txt && currentChatId && currentUser) { 
      saveAndSend(txt, 'text', txt); 
      els.messageInput.value = ''; 
      els.sendButton.disabled = true; 
    } 
  }
  
  function loadOnlineUsers() { 
    const online = users.filter(u => u.status === 'online'); 
    els.onlineCount.textContent = online.length; 
    els.onlineUsers.innerHTML = ''; 
    online.forEach(u => { 
      const div = document.createElement('div'); 
      div.className = 'online-item'; 
      div.onclick = () => { const cid = `conv_${u.id}`; selectChat(cid, u); }; 
      div.innerHTML = `<div class="relative"><div class="avatar avatar-sm"><i class="fas fa-${u.avatar}"></i></div><span class="status-badge online"></span></div><span class="text-xs font-medium">${u.name.split(' ')[0]}</span>`; 
      els.onlineUsers.appendChild(div); 
    }); 
  }
  
  // Auth Functions
  function login() { 
    const email = els.loginEmail.value; 
    const name = email.split('@')[0]; 
    isLoggedIn = true; 
    localStorage.setItem('isLoggedIn', 'true'); 
    localStorage.setItem('userName', name); 
    localStorage.setItem('userEmail', email); 
    currentUser = { uid: 'currentUser', displayName: name, email: email }; 
    updateUI(); 
    loadConversations(); 
    loadOnlineUsers(); 
    enableChat(true); 
    els.authModal.classList.remove('active'); 
    showToast(`Welcome ${name}`); 
    setTimeout(() => { if (document.querySelector('.conv-item')) document.querySelector('.conv-item').click(); }, 200); 
  }
  
  function register() { 
    const name = els.registerName.value || 'User'; 
    const email = els.registerEmail.value; 
    isLoggedIn = true; 
    localStorage.setItem('isLoggedIn', 'true'); 
    localStorage.setItem('userName', name); 
    localStorage.setItem('userEmail', email); 
    currentUser = { uid: 'currentUser', displayName: name, email: email }; 
    updateUI(); 
    loadConversations(); 
    loadOnlineUsers(); 
    enableChat(true); 
    els.authModal.classList.remove('active'); 
    showToast(`Welcome ${name}`); 
    setTimeout(() => { if (document.querySelector('.conv-item')) document.querySelector('.conv-item').click(); }, 200); 
  }
  
  function logout() { 
    isLoggedIn = false; 
    localStorage.removeItem('isLoggedIn'); 
    currentUser = null; 
    currentChatId = null; 
    currentChatUser = null; 
    updateUI(); 
    enableChat(false); 
    els.welcomeScreen.classList.remove('hidden'); 
    els.chatMessages.classList.add('hidden'); 
    els.chatUserName.textContent = 'Select a chat'; 
    loadConversations(); 
    showToast('Logged out successfully'); 
  }
  
  // Call Functions
  async function startAudioCall() { 
    if (!currentUser || !currentChatUser) return showToast('Select a chat first'); 
    try { 
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
      showIncomingCall('audio'); 
    } catch (e) { showToast('Microphone access needed'); } 
  }
  
  async function startVideoCall() { 
    if (!currentUser || !currentChatUser) return showToast('Select a chat first'); 
    try { 
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { width: 640, height: 480 } }); 
      showIncomingCall('video'); 
    } catch (e) { showToast('Camera access needed'); } 
  }
  
  function showIncomingCall(type) { 
    els.incomingCallAvatar.innerHTML = `<i class="fas fa-${currentChatUser.avatar}"></i>`; 
    els.incomingCallName.textContent = currentChatUser.name; 
    els.incomingCallType.textContent = `Incoming ${type} call...`; 
    els.incomingCallModal.classList.add('active'); 
  }
  
  function acceptCall() { 
    els.incomingCallModal.classList.remove('active'); 
    if (localStream && els.localVideo) els.localVideo.srcObject = localStream; 
    els.callUserName.textContent = currentChatUser.name; 
    els.callUserAvatar.innerHTML = `<i class="fas fa-${currentChatUser.avatar}"></i>`; 
    els.callStatus.textContent = 'Connected'; 
    
    // Simulate remote video
    setTimeout(() => { 
      const canvas = document.createElement('canvas'); 
      canvas.width = 640; canvas.height = 480; 
      const ctx = canvas.getContext('2d'); 
      ctx.fillStyle = '#2d3748'; ctx.fillRect(0, 0, 640, 480); 
      ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 70px Inter'; 
      ctx.fillText(currentChatUser.name.charAt(0), 280, 260); 
      const stream = canvas.captureStream(10); 
      if (els.remoteVideo) els.remoteVideo.srcObject = stream; 
    }, 500); 
    
    els.callModal.classList.add('active'); 
    startCallTimer(); 
  }
  
  function declineCall() { 
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } 
    els.incomingCallModal.classList.remove('active'); 
    showToast('Call declined'); 
  }
  
  function endCall() { 
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } 
    els.callModal.classList.remove('active'); 
    if (callTimerInterval) clearInterval(callTimerInterval); 
    showToast('Call ended'); 
  }
  
  function startCallTimer() { 
    callSeconds = 0; 
    if (callTimerInterval) clearInterval(callTimerInterval); 
    callTimerInterval = setInterval(() => { 
      callSeconds++; 
      const m = Math.floor(callSeconds / 60), s = callSeconds % 60; 
      els.callTimer.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; 
    }, 1000); 
  }
  
  function toggleCallMute() { 
    if (localStream) { 
      isCallMuted = !isCallMuted; 
      localStream.getAudioTracks().forEach(t => t.enabled = !isCallMuted); 
      const icon = els.callMuteBtn.querySelector('i'); 
      if (icon) icon.className = isCallMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone'; 
    } 
  }
  
  function toggleCallVideo() { 
    if (localStream) { 
      isVideoEnabled = !isVideoEnabled; 
      localStream.getVideoTracks().forEach(t => t.enabled = isVideoEnabled); 
      const icon = els.callVideoBtn.querySelector('i'); 
      if (icon) icon.className = isVideoEnabled ? 'fas fa-video' : 'fas fa-video-slash'; 
    } 
  }
  
  async function shareScreen() { 
    try { 
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true }); 
      if (els.localVideo) els.localVideo.srcObject = screenStream; 
      showToast('Screen sharing started'); 
    } catch (e) { showToast('Screen share cancelled'); } 
  }
  
  // UI Functions
  function toggleSidebar() { els.sidebar.classList.toggle('active'); els.overlay.classList.toggle('hidden'); }
  function closeSidebar() { els.sidebar.classList.remove('active'); els.overlay.classList.add('hidden'); }
  
  function toggleTheme() { 
    const isDark = document.body.getAttribute('data-theme') === 'dark'; 
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark'); 
    localStorage.setItem('theme', isDark ? 'light' : 'dark'); 
    const icon = els.themeToggle.querySelector('i'); 
    if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon'; 
  }
  
  function initTheme() { 
    const saved = localStorage.getItem('theme'); 
    if (saved === 'dark') { 
      document.body.setAttribute('data-theme', 'dark'); 
      const icon = els.themeToggle.querySelector('i'); 
      if (icon) icon.className = 'fas fa-moon'; 
    } 
  }
  
  // Attachment Handlers
  document.getElementById('photoAttach')?.addEventListener('click', () => { 
    els.photoInput.click(); 
    els.attachmentMenu.classList.add('hidden'); 
  });
  
  document.getElementById('fileAttach')?.addEventListener('click', () => { 
    els.fileInput.click(); 
    els.attachmentMenu.classList.add('hidden'); 
  });
  
  document.getElementById('locationAttach')?.addEventListener('click', () => { 
    els.attachmentMenu.classList.add('hidden'); 
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => { 
        const url = `https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`; 
        saveAndSend(`📍 My location`, 'location', url); 
        showToast('Location shared'); 
      }, () => showToast('Unable to get location'));
    } else showToast('Geolocation not supported');
  });
  
  els.photoInput.addEventListener('change', e => { 
    if (e.target.files && e.target.files[0]) { 
      const reader = new FileReader(); 
      reader.onload = ev => saveAndSend('📷 Photo', 'image', ev.target.result); 
      reader.readAsDataURL(e.target.files[0]); 
    } 
  });
  
  els.fileInput.addEventListener('change', e => { 
    if (e.target.files && e.target.files[0]) { 
      const f = e.target.files[0]; 
      saveAndSend(`📎 File: ${f.name} (${(f.size / 1024).toFixed(1)} KB)`, 'file'); 
    } 
  });
  
  // Event Bindings
  els.themeToggle.addEventListener('click', toggleTheme);
  els.authBtn.addEventListener('click', () => { if (currentUser) logout(); else els.authModal.classList.add('active'); });
  document.getElementById('doLogin')?.addEventListener('click', login);
  document.getElementById('doRegister')?.addEventListener('click', register);
  
  document.querySelectorAll('.auth-tab').forEach(tab => { 
    tab.addEventListener('click', () => { 
      const type = tab.getAttribute('data-tab'); 
      document.getElementById('loginForm').classList.toggle('hidden', type !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', type !== 'register');
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active')); 
      tab.classList.add('active'); 
    }); 
  });
  
  els.sendButton.addEventListener('click', sendMessage);
  els.messageInput.addEventListener('input', () => { els.sendButton.disabled = !els.messageInput.value.trim(); });
  els.messageInput.addEventListener('keypress', e => { if (e.key === 'Enter' && els.messageInput.value.trim()) sendMessage(); });
  els.attachBtn.addEventListener('click', () => els.attachmentMenu.classList.toggle('hidden'));
  els.audioCallBtn.addEventListener('click', startAudioCall);
  els.videoCallBtn.addEventListener('click', startVideoCall);
  document.getElementById('acceptCallBtn')?.addEventListener('click', acceptCall);
  document.getElementById('declineCallBtn')?.addEventListener('click', declineCall);
  document.getElementById('endCallBtn')?.addEventListener('click', endCall);
  document.getElementById('minimizeCallBtn')?.addEventListener('click', () => { els.callModal.classList.remove('active'); showToast('Call minimized'); });
  els.callMuteBtn?.addEventListener('click', toggleCallMute);
  els.callVideoBtn?.addEventListener('click', toggleCallVideo);
  document.getElementById('shareScreenBtn')?.addEventListener('click', shareScreen);
  document.getElementById('menuToggle')?.addEventListener('click', toggleSidebar);
  els.overlay?.addEventListener('click', closeSidebar);
  document.getElementById('profileBtn')?.addEventListener('click', () => { if (!currentUser) els.authModal.classList.add('active'); else showToast(`Profile: ${currentUser.displayName}`); });
  document.getElementById('welcomeSignIn')?.addEventListener('click', () => els.authModal.classList.add('active'));
  
  els.searchInput.addEventListener('input', e => { 
    const term = e.target.value.toLowerCase(); 
    document.querySelectorAll('.conv-item').forEach(i => { 
      const name = i.querySelector('.font-bold')?.textContent.toLowerCase() || ''; 
      i.style.display = name.includes(term) ? 'flex' : 'none'; 
    }); 
  });
  
  window.addEventListener('resize', () => { if (window.innerWidth >= 768) closeSidebar(); });
  
  // Close attachment menu when clicking outside
  document.addEventListener('click', (e) => {
    if (!els.attachmentMenu.contains(e.target) && !els.attachBtn.contains(e.target)) {
      els.attachmentMenu.classList.add('hidden');
    }
  });
  
  // Initialize
  initTheme();
  if (isLoggedIn) { 
    currentUser = { uid: 'currentUser', displayName: localStorage.getItem('userName') || 'Demo', email: localStorage.getItem('userEmail') || 'demo@wavechat.com' }; 
    updateUI(); 
    loadConversations(); 
    loadOnlineUsers(); 
    enableChat(true); 
    setTimeout(() => { if (document.querySelector('.conv-item')) document.querySelector('.conv-item').click(); }, 300); 
  } else { 
    enableChat(false); 
    loadOnlineUsers(); 
    updateUI(); 
    loadConversations();
  }
})();
</script>
</body>
</html>
